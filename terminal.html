<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOBLE TERMINAL V1.4</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <style>
    :root {
      --bg-base: #000000; --bg-pane: #0a0a0a; --border-main: #1a1a1a; --border-focus: #334155;
      --text-main: #e2e8f0; --text-muted: #64748b;
      --term-blue: #0044cc; --term-gold: #ff9900; --term-up: #00ff00; --term-dn: #ff0000;
      --font-mono: 'Consolas', 'Courier New', monospace; --font-sans: 'Arial', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-base); color: var(--text-main); font-family: var(--font-sans); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

    #command-bar { height: 35px; background: var(--term-blue); display: flex; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--term-gold); }
    #cli-prompt { color: #fff; font-weight: bold; font-family: var(--font-mono); margin-right: 10px; font-size: 14px;}
    #cli-input { background: transparent; border: none; color: #fff; font-family: var(--font-mono); font-size: 14px; font-weight: bold; width: 500px; outline: none; }
    .top-clock { margin-left: auto; font-family: var(--font-mono); color: #fff; font-size: 12px; font-weight: bold; display: flex; gap: 15px;}
    
    #workspace { display: grid; grid-template-columns: 55% 45%; grid-template-rows: 50% 50%; height: calc(100vh - 35px); width: 100%; gap: 2px; background: var(--border-main); }
    .pane { background: var(--bg-pane); display: flex; flex-direction: column; overflow: hidden; }
    .pane-header { background: #111111; padding: 4px 10px; font-size: 11px; font-weight: bold; color: var(--term-gold); text-transform: uppercase; border-bottom: 1px solid var(--border-focus); display: flex; justify-content: space-between; align-items: center;}
    .pane-content { flex: 1; overflow-y: auto; overflow-x: auto; padding: 10px; position: relative;}
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-focus); }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 11px; margin-bottom: 15px;}
    th { text-align: right; padding: 4px 6px; color: var(--text-muted); font-weight: normal; border-bottom: 1px solid #222; position: sticky; top: 0; background: var(--bg-pane); z-index: 10;}
    th:first-child, td:first-child { text-align: left; }
    td { padding: 4px 6px; text-align: right; border-bottom: 1px dotted #1a1a1a; transition: background-color 0.2s ease; white-space: nowrap;}
    tr:hover td { background: #111111; cursor: pointer; }
    
    .up { color: var(--term-up) !important; }
    .dn { color: var(--term-dn) !important; }
    .nt { color: var(--text-muted) !important; }
    .sym { color: #fff; font-weight: bold; }
    .flash-update { animation: flashYellow 1s ease-out; }
    @keyframes flashYellow { 0% { background-color: #ffd700; color: #000; } 100% { background-color: transparent; } }

    #pane-left { grid-row: 1 / 3; grid-column: 1 / 2; }
    #pane-chart { grid-row: 1 / 2; grid-column: 2 / 3; display: flex; flex-direction: column;}
    #pane-portfolio { grid-row: 2 / 3; grid-column: 2 / 3; }

    .view-tabs { display: flex; gap: 10px; font-family: var(--font-mono); font-size: 10px;}
    .v-tab { color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
    .v-tab:hover { color: #fff; }
    .v-tab.active { color: var(--term-gold); font-weight: bold; text-decoration: underline;}
    .data-view { display: none; }
    .data-view.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    
    .chart-wrapper { position: relative; height: 100%; width: 100%; flex: 1; padding: 10px; }
    .section-title { font-family: var(--font-mono); color: var(--term-gold); font-size: 11px; margin: 10px 0 5px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 3px;}
    .flex-row { display: flex; gap: 15px; } .flex-col { flex: 1; }

    .port-metrics { display: flex; gap: 20px; padding: 10px; background: #000; border-bottom: 1px solid #222; font-family: var(--font-mono);}
    .p-met { display: flex; flex-direction: column; }
    .p-met-lbl { color: var(--text-muted); font-size: 10px; }
    .p-met-val { color: #fff; font-size: 14px; font-weight: bold; }
    
    #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; font-family: var(--font-mono); }
    .auth-box { border: 1px solid var(--border-focus); padding: 20px; background: #000; width: 300px;}
    .auth-title { color: var(--term-gold); font-weight: bold; text-align: center; margin-bottom: 15px; font-size: 12px; }
    .auth-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;}
    .auth-row label { color: var(--text-muted); font-size: 11px; }
    .auth-row input { background: transparent; border: 1px dotted var(--text-muted); color: #fff; font-family: var(--font-mono); padding: 4px; width: 150px; outline: none; font-size: 11px;}
    .auth-row input:focus { border-bottom: 1px solid var(--term-gold); }
    .auth-btn { background: var(--border-focus); color: #fff; border: none; padding: 6px; width: 100%; font-family: var(--font-mono); cursor: pointer; margin-top: 10px; font-size: 11px; font-weight: bold;}
    .auth-btn:hover { background: var(--term-blue); }
    
    .news-item { padding: 8px 0; border-bottom: 1px dotted #1a1a1a; font-family: var(--font-mono); }
    .n-title { color: #fff; font-size: 11px; font-weight: bold; margin-bottom: 4px; text-decoration: none;}
    .n-title:hover { color: var(--term-gold); }
    .n-desc { color: var(--text-muted); font-size: 10px; line-height: 1.3;}
